{% extends "base.html" %}

{% block title %}Change Password - Bug Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1><i class="fas fa-key"></i> Change Password</h1>
        <form method="POST" class="form">
            <div class="form-group">
                <label for="current_password">Current Password:</label>
                <input type="password" id="current_password" name="current_password" required class="form-control">
            </div>
            <div class="form-group">
                <label for="new_password">New Password:</label>
                <input type="password" id="new_password" name="new_password" required class="form-control" minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" required class="form-control" minlength="8">
            </div>
            <button type="submit" class="btn btn-primary">Change Password</button>
        </form>
        <p class="auth-link">
            <a href="{{ url_for('dashboard.dashboard') }}">Back to dashboard</a>
        </p>
    </div>
</div>
{% endblock %}
