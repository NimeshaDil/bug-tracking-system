{% extends "base.html" %}

{% block title %}Forgot Password - Bug Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1><i class="fas fa-question-circle"></i> Forgot Password</h1>
        <p>Enter your email address to receive a password reset token.</p>
        <form method="POST" class="form">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Send Reset Token</button>
        </form>
        <p class="auth-link">
            Remember your password? <a href="{{ url_for('auth.login') }}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
