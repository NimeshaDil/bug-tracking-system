{% extends "base.html" %}

{% block title %}Reset Password - Bug Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1><i class="fas fa-lock"></i> Reset Password</h1>
        <form method="POST" class="form">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required class="form-control">
            </div>
            <div class="form-group">
                <label for="token">Reset Token:</label>
                <input type="text" id="token" name="token" required class="form-control" placeholder="Paste the token from your email">
            </div>
            <div class="form-group">
                <label for="new_password">New Password:</label>
                <input type="password" id="new_password" name="new_password" required class="form-control" minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" required class="form-control" minlength="8">
            </div>
            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>
        <p class="auth-link">
            <a href="{{ url_for('auth.login') }}">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
