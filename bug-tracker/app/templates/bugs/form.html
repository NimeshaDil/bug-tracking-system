{% extends "base.html" %}

{% block title %}{% if bug %}Edit{% else %}Create{% endif %} Bug - Bug Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <h1>{% if bug %}Edit Bug{% else %}Create Bug{% endif %}</h1>
    <form method="POST" class="form">
        <div class="form-group">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required class="form-control" value="{{ bug.title if bug else '' }}">
        </div>
        <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" name="description" rows="6" class="form-control">{{ bug.description if bug else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="priority">Priority:</label>
            <select id="priority" name="priority" class="form-control">
                <option value="low" {% if bug and bug.priority == 'low' %}selected{% endif %}>Low</option>
                <option value="medium" {% if not bug or bug.priority == 'medium' %}selected{% endif %}>Medium</option>
                <option value="high" {% if bug and bug.priority == 'high' %}selected{% endif %}>High</option>
                <option value="critical" {% if bug and bug.priority == 'critical' %}selected{% endif %}>Critical</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">{% if bug %}Update Bug{% else %}Create Bug{% endif %}</button>
    </form>
</div>
{% endblock %}
