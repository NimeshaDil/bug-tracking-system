version: '3.8'

services:
  db:
    image: postgres:16
    container_name: bugtracker-db
    environment:
      POSTGRES_USER: buguser
      POSTGRES_PASSWORD: bugpass
      POSTGRES_DB: bugtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buguser -d bugtracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: bugtracker-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: development
      FLASK_APP: wsgi.py
      SECRET_KEY: dev-secret-key-change-in-production
      DATABASE_URL: postgresql://buguser:bugpass@db:5432/bugtracker
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./app/uploads:/app/app/uploads
    command: flask run --host 0.0.0.0

volumes:
  postgres_data:
